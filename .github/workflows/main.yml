name: CI Automation Pipeline
on: [push]
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Run Tests
        # CAMBIAR 'py' POR 'python' ACÁ PARA QUE FUNCIONE:
        run: python -m pytest tests/ tests_api/ -v
      - name: Run BDD tests
        run: python -m behave